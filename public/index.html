<!DOCTYPE html>
<html>
<head>
  <title>Proxy Browser</title>
  <style>
    body { margin:0; background:#0f0f0f; color:white; font-family:Arial; }
    #tabs { display:flex; background:#111; padding:5px; overflow-x:auto; }
    .tab { padding:6px 10px; background:#222; margin-right:5px; cursor:pointer; display:flex; align-items:center; }
    .active { background:#4CAF50; }
    #bar { display:flex; padding:10px; background:#1a1a1a; align-items:center; }
    input { flex:1; padding:10px; border:none; outline:none; font-size:16px; }
    button { padding:10px; background:#4CAF50; border:none; color:white; cursor:pointer; margin-right:5px; }
    #frame { height: calc(100vh - 100px); position:relative; }
    .tab button { margin-left:5px; background:red; border:none; color:white; cursor:pointer; padding:2px 6px; }
    .tab-container { position:absolute; top:0; left:0; width:100%; height:100%; display:none; }
    .tab-container.active { display:block; }
    iframe { width:100%; height:100%; border:none; }

    #suggestion {
      position:absolute;
      top:60px;
      left:50%;
      transform:translateX(-50%);
      background:#222;
      padding:10px 15px;
      border-radius:8px;
      display:none;
      z-index:999;
    }
  </style>
</head>
<body>

<div id="tabs"></div>

<div id="bar">
  <button onclick="openAdvancedPrompt()">Advanced</button>
  <input id="url" placeholder="Search or enter URL">
  <button onclick="go()">Go</button>
  <button onclick="newTab()">+</button>
</div>

<div id="suggestion">
  This site might not load properly. Try Advanced Mode.
  <button onclick="openAdvancedPrompt()">Open</button>
</div>

<div id="frame"></div>

<script>
let tabs = [];
let currentTab = 0;

// Helpers
function isURL(str) { return str.includes(".") && !str.includes(" "); }
function buildURL(input) {
  if (isURL(input)) return input.startsWith("http") ? input : "https://" + input;
  else return "https://html.duckduckgo.com/html/?q=" + encodeURIComponent(input);
}

// ENTER key
document.getElementById("url").addEventListener("keydown", e => {
  if(e.key==="Enter") go();
});

// Tabs
function newTab() {
  const container = document.createElement("div");
  container.className = "tab-container";

  const iframe = document.createElement("iframe");
  container.appendChild(iframe);
  document.getElementById("frame").appendChild(container);

  tabs.push({url:"", container, iframe});
  currentTab = tabs.length-1;
  renderTabs();
  switchTab(currentTab);
}

function switchTab(i) {
  currentTab = i;
  renderTabs();
  tabs.forEach((t,j)=>{
    t.container.classList.toggle("active", j===i);
  });
  document.getElementById("url").value = tabs[i].url || "";
}

function closeTab(i) {
  const tab = tabs[i];
  tab.container.remove();
  tabs.splice(i,1);
  if(currentTab>=tabs.length) currentTab=tabs.length-1;
  renderTabs();
  if(tabs.length>0) switchTab(currentTab);
}

function renderTabs() {
  const tabBar = document.getElementById("tabs");
  tabBar.innerHTML = "";

  tabs.forEach((t, i) => {
    const el = document.createElement("div");
    el.className = "tab " + (i===currentTab?"active":"");

    const text = document.createElement("span");
    text.textContent = t.url || "New Tab";
    el.appendChild(text);

    const closeBtn = document.createElement("button");
    closeBtn.textContent = "×";
    closeBtn.onclick = (e) => { e.stopPropagation(); closeTab(i); };
    el.appendChild(closeBtn);

    el.onclick = () => switchTab(i);
    tabBar.appendChild(el);
  });
}

// Load page
function loadPage(url) {
  const tab = tabs[currentTab];
  tab.url = url;
  document.getElementById("url").value = url;

  document.getElementById("suggestion").style.display = "none";

  tab.iframe.src = "/api/proxy?url=" + encodeURIComponent(url);

  setTimeout(() => {
    try {
      const doc = tab.iframe.contentDocument;
      if (!doc || doc.body.innerText.trim() === "") {
        showSuggestion();
      }
    } catch {
      showSuggestion();
    }
  }, 3000);
}

// Suggestion
function showSuggestion() {
  document.getElementById("suggestion").style.display = "block";
}

// Go
function go() {
  const input = document.getElementById("url").value.trim();
  const url = buildURL(input);
  loadPage(url);
  renderTabs();
}

// Advanced Mode Prompt
function openAdvancedPrompt() {
  const tab = tabs[currentTab];
  if (!tab.url) return;

  const confirmed = confirm(
    "You are entering Advanced Mode.\n\n" +
    "This will leave the proxy browser.\n" +
    "To return, reopen it manually.\n\n" +
    "Continue?"
  );

  if (!confirmed) return;

  openAdvanced(tab.url);
}

// Advanced Mode (CORS + fallback)
function openAdvanced(url) {
  const newPage = window.open("about:blank", "_self");

  newPage.document.open();
  newPage.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <title>Advanced Mode</title>
      <style>
        body { margin:0; background:#0f0f0f; color:white; font-family:sans-serif; }
        #bar { position:fixed; top:0; left:0; right:0; background:#111; padding:8px; z-index:999; }
        #suggest { position:fixed; top:50px; left:50%; transform:translateX(-50%); background:#222; padding:10px 15px; border-radius:8px; display:none; z-index:1000; }
        iframe { border:none; width:100%; height:100vh; }
      </style>
    </head>
    <body>

      <div id="bar">Switching to Advanced Mode...</div>

      <div id="suggest">
        This site isn't working in Advanced Mode.<br>
        Open it normally?
        <br><br>
        <button onclick="openReal()">Open</button>
      </div>

      <iframe id="frame"></iframe>

      <script>
        const target = "${url}";
        const proxy = "https://corsproxy.io/?";

        async function loadPage(u) {
          try {
            const res = await fetch(proxy + encodeURIComponent(u));
            const text = await res.text();

            if (!text || text.length < 500) {
              showSuggestion();
              return;
            }

            let html = text;

            html = html.replace(/href="(.*?)"/g, (m, p1) => {
              if (p1.startsWith("http")) {
                return 'href="#" onclick="parent.loadPage(\\'' + p1 + '\\')"';
              }
              return m;
            });

            html = html.replace(/action="(.*?)"/g, (m, p1) => {
              if (p1.startsWith("http")) {
                return 'action="#" onsubmit="parent.loadPage(\\'' + p1 + '\\'); return false;"';
              }
              return m;
            });

            document.getElementById("frame").srcdoc = html;

            setTimeout(() => {
              const iframe = document.getElementById("frame");
              try {
                const doc = iframe.contentDocument;
                if (!doc || doc.body.innerText.trim() === "") {
                  showSuggestion();
                }
              } catch {
                showSuggestion();
              }
            }, 3000);

          } catch {
            showSuggestion();
          }
        }

        function showSuggestion() {
          document.getElementById("suggest").style.display = "block";
        }

        function openReal() {
          window.location.href = target;
        }

        window.loadPage = loadPage;

        setTimeout(() => {
          loadPage(target);
        }, 300);

      <\/script>
    </body>
    </html>
  `);
  newPage.document.close();
}

// Messages
window.addEventListener('message', e => {
  if(e.data && e.data.type === 'openNewTab' && e.data.url) {
    newTab();
    loadPage(e.data.url);
  }
});

// Init
newTab();
</script>

</body>
</html>
