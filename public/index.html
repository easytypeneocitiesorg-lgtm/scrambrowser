<!DOCTYPE html>
<html>
<head>
  <title>Proxy Browser</title>
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    #bar {
      display: flex;
      padding: 10px;
      background: #1a1a1a;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 10px;
      background: #4CAF50;
      border: none;
      color: white;
      cursor: pointer;
    }

    #frame {
      padding: 20px;
    }
  </style>
</head>
<body>

<div id="bar">
  <input id="url" placeholder="Search or enter URL">
  <button onclick="go()">Go</button>
</div>

<div id="frame">Ready.</div>

<script src="/scramjet.client.js"></script>

<script>
function isURL(str) {
  return str.includes(".") && !str.includes(" ");
}

function buildURL(input) {
  if (isURL(input)) {
    return input.startsWith("http") ? input : "https://" + input;
  } else {
    return "https://duckduckgo.com/?q=" + encodeURIComponent(input);
  }
}

async function go() {
  let input = document.getElementById("url").value.trim();
  let url = buildURL(input);

  loadPage(url);
}

async function loadPage(url) {
  const res = await fetch("/api/proxy?url=" + encodeURIComponent(url));
  let html = await res.text();

  // Pass through Scramjet rewriting
  html = window.$scramjet.rewriteHtml(html, url);

  document.getElementById("frame").innerHTML = html;
}
</script>

</body>
</html>
