<!DOCTYPE html>
<html>
<head>
  <title>Real Proxy Browser</title>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    #bar {
      display: flex;
      padding: 10px;
      background: #1a1a1a;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 10px;
      background: #4CAF50;
      border: none;
      color: white;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
    }
  </style>
</head>
<body>

<div id="bar">
  <input id="url" placeholder="Search or enter URL">
  <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>
function isURL(str) {
  return str.includes(".") && !str.includes(" ");
}

function buildURL(input) {
  if (isURL(input)) {
    return input.startsWith("http") ? input : "https://" + input;
  } else {
    return "https://duckduckgo.com/?q=" + encodeURIComponent(input);
  }
}

function go() {
  let input = document.getElementById("url").value.trim();
  let url = buildURL(input);

  document.getElementById("frame").src = "/bare/" + btoa(url);
}

// ENTER KEY
document.getElementById("url").addEventListener("keydown", e => {
  if (e.key === "Enter") go();
});
</script>

</body>
</html>
